# Build Android APK. Uses Expo prebuild + Gradle; signs with debug keystore.
# This project has no .env; no env file step required.
name: Build Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Setup Corepack Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('yarn.lock', 'package.json', 'app.config.js', 'plugins/*.js') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"
          accept-android-sdk-licenses: true

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Create debug keystore for release signing
        run: |
          rm -f android/app/debug.keystore
          keytool -genkeypair -v -storetype PKCS12 \
            -keystore android/app/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Set SDK path for Gradle
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Copy APK for artifact
        run: cp android/app/build/outputs/apk/release/app-release.apk app.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app.apk

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Rename APK with version
        run: mv app.apk featherpunch-v${GITHUB_REF#refs/tags/v}.apk

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: featherpunch-v*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
