# Build Android release artifacts (APK + AAB) and optionally upload to Google Play.
name: Build Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Corepack Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('yarn.lock', 'package.json', 'app.config.js', 'plugins/*.js') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"
          accept-android-sdk-licenses: true

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Configure release keystore from secrets
        run: |
          if [ -n "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
            {
              echo "MYAPP_UPLOAD_STORE_FILE=release.keystore"
              echo "MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}"
              echo "MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}"
              echo "MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}"
            } >> android/gradle.properties
          else
            echo "No release keystore secrets found; falling back to generated debug keystore."
            rm -f android/app/debug.keystore
            keytool -genkeypair -v -storetype PKCS12 \
              -keystore android/app/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Set SDK path for Gradle
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build release APK and AAB
        run: cd android && ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Copy release artifacts
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk app-release.apk
          cp android/app/build/outputs/bundle/release/app-release.aab app-release.aab

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-files
          path: |
            app-release.apk
            app-release.aab

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-release-files

      - name: Rename artifacts with version
        run: |
          mv app-release.apk featherpunch-v${GITHUB_REF#refs/tags/v}.apk
          mv app-release.aab featherpunch-v${GITHUB_REF#refs/tags/v}.aab

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            featherpunch-v*.apk
            featherpunch-v*.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  playstore:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: android-release-files

      - name: Upload to Google Play (internal)
        if: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.featherpunch.app
          releaseFiles: app-release.aab
          track: internal
